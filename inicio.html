  <style>
    /*colores
  morado:#6A253A
  rosado#E64B6B:
  crema:#EFE2DA*/
    body {
      font-family: 'Chillax-Semibold';
      margin: 0;
      display: grid;
      grid-template-areas:
        "nav header"
        "nav main"
        "nav footer";
      grid-template-rows: 250px auto 100px;
      grid-template-columns: 15% auto;
    }

    header {
      grid-area: header;
      background-image: url(imagenes/10.png);
      background-size: cover;        
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 5px solid #E64B6B;
    }
    header img{
  animation: aparecer 1.5s ease;
}

@keyframes aparecer{
  from{
    opacity: 0;
    transform: scale(0.7);
  }
  to{
    opacity: 1;
    transform: scale(1);
  }
}
    #g{
      scale: 0.5;
    }

    nav {
      grid-area: nav;
      background-color: #6A253A;
      color: #EFE2DA;
      font-family: Arial, sans-serif;
      width: 282px;
      grid-area: nav;
      top: 0;
      left: 0;
      border-right: 5px solid #E64B6B;
      transition: color 0.3s;
    }
    
    nav:hover{
      color: #c59d5f;
    }
    main {
      grid-area: main;
      background-image: url("imagenes/2.png");
      background-repeat: no-repeat;
      background-size: cover;
      padding: 30px;
    }


    .indice ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .indice a {
      text-decoration: none;
      color: #EFE2DA;
      display: block;
      padding: 20px;
      transition: background-color 0.6s, color 0.6s;
    }
    #compra{
      border-radius: 50%;
      width: 20px;
      height: 20px;
    }

    .indice a:hover {
      background-color: #E64B6B;
      color: #EFE2DA;
    }
    #n{
      font-family: 'Chillax-Medium';
      font-size: 45px;
      color: #6A253A;
      text-align: left;
      margin-bottom: 1rem;
      display: inline-block;
      border-bottom: 2px solid #E64B6B;
    }
    h3{
      font-family: 'Chillax-Light';
      font-size: 25px;
      color: #6A253A;
      text-align: left;
      margin-bottom: 1rem;
      border-bottom: 2px solid #E64B6B;
      padding-left:80px;
    }
    h3 a{
      color:#6A253A
    }
    #fotos{
      display: grid;
      grid-template-columns: repeat(2, 1fr); 
      grid-template-rows: repeat(2, auto);
      gap: 40px;
      justify-items: center;
      margin-top: 20px;
    }
    .prod{
      width: 500px;
      height: 400px;
      border-radius: 20px;
      transition: transform 0.4s ease, box-shadow 0.4s ease, filter 0.4s ease;
       object-fit: cover;
    }
    .prod:hover{
      transform: scale(1.05) translateY(-8px);
  box-shadow: 0 12px 25px rgba(0,0,0,0.3);
  filter: brightness(1.08);
    
}
    footer {
      grid-area: footer;
      background-color: #6A253A;
      color: #EFE2DA;
      display: flex;
      justify-content: center;
      align-items: center;
      border-top: 5px solid #E64B6B;
    }
@media(max-width:800px){

  body{
    grid-template-areas:
      "header"
      "nav"
      "main"
      "footer";

    grid-template-columns: 100%;
    grid-template-rows: auto auto auto auto;
  }


  header{
    height: 180px;
    padding: 20px;
    text-align: center;
  }

  #g{
    width: 250px;
    scale: 1;
  }


  nav{
    width: 100%;
    border-right: none;
    border-bottom: 5px solid #E64B6B;
  }

  .indice ul{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }

  .indice li{
    flex: 1 1 120px;
  }

  .indice a{
    padding: 15px;
    text-align: center;
    font-size: 15px;
  }


  main{
    padding: 20px;
    text-align: center;
  }

  #n{
    font-size: 35px;
    text-align: center;
  }


  #fotos{
    grid-template-columns: 1fr;
    gap: 30px;
  }

  .prod{
    width: 100%;
    max-width: 320px;
    height: 250px;
    border-radius: 20px;
  }

  h3{
    font-size: 20px;
    padding-left: 0;
    text-align: center;
  }


  footer{
    text-align: center;
    padding: 15px;
    font-size: 14px;
  }
}
  </style>
