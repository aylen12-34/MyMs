<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M&M's</title>
  <link rel="stylesheet" href="tipografia/Fonts/WEB/css/chillax.css">
  <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    /*colores
  morado:#6A253A
  rosado#E64B6B:
  crema:#EFE2DA*/
    body {
      font-family: 'Chillax-Semibold';
      margin: 0;
      display: grid;
      grid-template-areas:
        "nav header"
        "nav main"
        "nav footer";
      grid-template-rows: 250px auto 100px;
      grid-template-columns: 15% 85%;
    }

    header {
      grid-area: header;
      background-image: url(https://aurogenesis.com/wp-content/uploads/2025/07/Ponceau-4R-Colour-in-Malaysia.jpg);
      background-size: cover;        
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 5px solid #E64B6B;
    }
    #g{
      scale: 0.5;
    }

    nav {
      grid-area: nav;
      background-color: #6A253A;
      color: #EFE2DA;
      font-family: Arial, sans-serif;
      width: 282px;
      grid-area: nav;
      top: 0;
      left: 0;
      border-right: 5px solid #E64B6B;
      transition: color 0.3s;
    }
    
    nav:hover{
      color: #c59d5f;
    }
    main {
      grid-area: main;
      background-image: url("2.png");
      background-repeat: no-repeat;
      background-size: cover;
      padding: 30px;
    }

    #m {
      font-family: 'Chillax-Semibold';
      color: #EFE2DA;
      text-align: center;
      font-size: 100px;
      margin: 1rem 0;
      letter-spacing: 1px;
    }

    .indice ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .indice a {
      text-decoration: none;
      color: #EFE2DA;
      display: block;
      padding: 20px;
      transition: background-color 0.6s, color 0.6s;
    }
    #compra{
      border-radius: 50%;
      width: 20px;
      height: 20px;
    }

    .indice a:hover {
      background-color: #E64B6B;
      color: #EFE2DA;
    }
    #n{
      font-family: 'Chillax-Medium';
      font-size: 45px;
      color: #6A253A;
      text-align: left;
      margin-bottom: 1rem;
      display: inline-block;
      border-bottom: 2px solid #E64B6B;
    }
    h3{
      font-family: 'Chillax-Light';
      font-size: 25px;
      color: #6A253A;
      text-align: left;
      margin-bottom: 1rem;
      border-bottom: 2px solid #E64B6B;
      padding-left:80px;
    }
    h3 a{
      text-decoration: none;
      color:#6A253A
    }
    #fotos{
      display: grid;
      grid-template-columns: repeat(2, 1fr); 
      grid-template-rows: repeat(2, auto);
      gap: 40px;
      justify-items: center;
      margin-top: 20px;
    }
    .prod{
      width: 500px;
      height: 400px;
      border-radius: 20px;
      transition: transform 0.3s;
       object-fit: cover;
    }
    .prod:hover{
      transform: scale(1.1);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }
    footer {
      grid-area: footer;
      background-color: #6A253A;
      color: #EFE2DA;
      display: flex;
      justify-content: center;
      align-items: center;
      border-top: 3px solid #E64B6B;
    }
    @media (max-width: 1200px) {
  body {
    grid-template-areas:
      "header"
      "nav"
      "main"
    "footer";
    grid-template-columns: 100%;
    grid-template-rows: auto;
  }
  header{
    height: 300px;
  }
  nav {
    width: 100% ;
    border-bottom: 5px solid #E64B6B;
    border-right: none;
  }
  main {
  padding: 15px;
}
 #fotos {
    grid-template-columns: 1fr;
  }
#fotos div {
  overflow: hidden;
  border-radius: 20px;
}
  .prod {
    width: 100%;
    transform: scale(1);
  }

  #m {
    font-size: 60px;
  }

  #n, h3 {
    padding-left: 20px;
  }
}
  </style>
</head>
<body>
  <nav class="indice">
    <ul>
      <li><a href="">Inicio</a></li>
      <li><a href="">Iniciar sesión</a></li>
      <li><a href="">Menu</a></li>
      <li><a href="">Promociones</a></li>
      <li><a href="">Nosotros</a></li>
      <li><a href="" ><img src="https://cdn-icons-png.freepik.com/512/9341/9341730.png" id="compra"></a></li>
    </ul>
  </nav>
  <header>
   <img src="MYMS 4 SIN FONDO.png" alt="" id="g">
  </header>
  <main>
    <h2 id="n">Nuestra Variedad</h2>
    <section id="fotos">
        <div>
          <a href="" ><img src="applepie.jpg" class="prod"></a>
          <h3>TORTAS Y BROWNIES</h3>
        </div>
        <div>
          <a href="" ><img src="frappe.png" class="prod"></a>
          <h3>BEBIDAS FRIAS</h3>
        </div>
        <div>
          <a href="" ><img src="cafe.jpg" class="prod"></a>
          <h3>BEBIDAS CALIENTES</h3>
        </div>
        <div>
          <a href="" ><img src="cinnamonrolls.jpg" class="prod"></a>
          <h3>MASITAS</h3>
        </div>
    </section>
    <h3>Para realizar su pedido, escoja sus productos en: <a href="">Menú y pedidos</a></h3>
  </main>
  <footer>
    <p>&copy; 2026 M&M's. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
