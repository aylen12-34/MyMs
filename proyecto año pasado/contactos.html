    body {

      background-color: #fff;
      margin-left: 260px;

    header {
      grid-area: header;

      border-radius: 50%;
      width: 20px;

    }
    nav:hover{
      color: #c59d5f;
    }
    main {
      grid-area: main;
      background-color: #fff;
      padding: 30px;
    }

    #m {
      font-family: 'Cinzel Decorative', serif;

    .indice ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .indice a {
      text-decoration: none;
      color: #b2b2b2;
      display: block;
      padding: 20px;
      transition: background-color 0.6s, color 0.6s;
    }

    .indice a:hover {
      background-color: #333;
      color: white;
    }
    #n{
      font-family:  'Cinzel Decorative', serif;
      font-size: 45px;
      color: #2b2b2b;
      text-align: left;
      margin-bottom: 1rem;
      border-bottom: 2px solid #c59d5f;
      padding-left:80px;
    }
    #fotos{
      display: grid;
      grid-template-columns: repeat(3, 1fr); 
      grid-template-rows: repeat(3, auto);
      gap: 60px;
      justify-items: center;
      margin-top: 20px;
    }
    #fotos img{
      width: 300px;
      height: 200px;
      border-radius: 20px;
      transition: transform 0.3s;
    }
    #fotos img:hover{
      transform: scale(1.1);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }
    .contact-container {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 50px;
  padding: 40px 80px;
  flex-wrap: wrap;
}

.contact-info {
  flex: 1;
  min-width: 300px;
  font-size: 18px;
  line-height: 1.8;
  color: #333;
}

.contact-info h3 {
  color: #c59d5f;
  font-family: 'Cinzel Decorative', serif;
  font-size: 28px;
  margin-bottom: 20px;
}

.contact-info a {
  color: #c59d5f;
  text-decoration: none;
  font-weight: 600;
  transition: color 0.3s;
}

.contact-info a:hover {
  color: #a88247;
  text-decoration: underline;
}

.contact-images {
  flex: 1;
  min-width: 350px;
  display: flex;
  flex-direction: column;
  gap: 25px;
  align-items: center;
}

.contact-images img {
  width: 90%;
  border-radius: 20px;
  transition: transform 0.3s;
}

.contact-images img:hover {
  transform: scale(1.05);
  box-shadow: 4px 10px 20px rgba(0,0,0,0.2);
}

@media (max-width: 1200px) {

  body {
     margin-left: 0;                    
    grid-template-areas:
      "header"
      "nav"
      "main";                           
    grid-template-rows: auto auto auto;

  nav {
    width: 100%;
    height: auto;
    position: static;
    border-right: none;
    padding-bottom: 10px;
  }

  header {
    margin-top: 0;
  }

  #m {
    font-size: 60px;
    text-align: center;
  }

  #n {
    padding-left: 0;
    text-align: center;
  }

  .contact-container {
    padding: 20px;
    flex-direction: column;
    align-items: center;
  }

  .contact-images img {
    width: 100%;
    max-width: 350px;
    height: auto;
  }
}
