    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      display: grid;
      grid-template-areas:
        "nav header"
        "nav main"
        "nav footer";
      grid-template-rows: 250px auto 100px;
      grid-template-columns: 15% 85%;
      background-color: #fff;
    }

    header {
      grid-area: header;
      background-image: image(images);
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 5px solid #c59d5f;
    }

    nav {
      grid-area: nav;

      color: #b2b2b2;
      font-family: Arial, sans-serif;
      width: 300px;
      grid-area: nav;
      top: 0;
      left: 0;
      border-right: 5px solid #c59d5f;
      transition: color 0.3s;
    }
    
    nav:hover{
      color: #c59d5f;
    }
    main {
      grid-area: main;
      background-color: #fff;
      padding: 30px;
    }

    #m {
      font-family: 'Cinzel Decorative', serif;
      color: #c59d5f;
      text-align: center;
      font-size: 100px;
      margin: 1rem 0;
      letter-spacing: 1px;
    }

    .indice ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .indice a {
      text-decoration: none;
      color: #b2b2b2;
      display: block;
      padding: 20px;
      transition: background-color 0.6s, color 0.6s;
    }
    #compra{
      border-radius: 50%;
      width: 20px;
      height: 20px;
    }

    .indice a:hover {
      background-color: #333;
      color: white;
    }
    #n{
      font-family:  'Cinzel Decorative', serif;
      font-size: 45px;
      color: #2b2b2b;
      text-align: left;
      margin-bottom: 1rem;
      border-bottom: 2px solid #c59d5f;
      padding-left:80px;
    }
    h3{
      font-family:  'Cinzel Decorative', serif;
      font-size: 25px;
      color: #2b2b2b;
      text-align: left;
      margin-bottom: 1rem;
      border-bottom: 2px solid #c59d5f;
      padding-left:80px;
    }
    h3 a{
      text-decoration: none;
      color:#c59d5f
    }
    #fotos{
      display: grid;
      grid-template-columns: repeat(2, 1fr); 
      grid-template-rows: repeat(2 auto);
      gap: 40px;
      justify-items: center;
      margin-top: 20px;
    }
    .prod{
      width: 500px;
      height: 400px;
      border-radius: 20px;
      transition: transform 0.3s;
       object-fit: cover;
    }
    .prod:hover{
      transform: scale(1.1);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }
    footer {
      grid-area: footer;
      background-color: #333;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      border-top: 3px solid #c59d5f;
    }
    @media (max-width: 1200px) {
  body {
    grid-template-areas:
      "header"
      "nav"
      "main"
      "footer";
    grid-template-columns: 100%;
    grid-template-rows: auto;
  }

  nav {
    width: 100%;
    border-bottom: 5px solid #c59d5f;
  }

  main {
    margin-left: 0;
    padding: 20px;
  }

  #fotos {
    grid-template-columns: 1fr;
  }

  .prod {
    width: 100%;
    height: auto;
  }

  #m {
    font-size: 60px;
  }

  #n, h3 {
    padding-left: 20px;
  }
}
