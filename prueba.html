<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M&M's</title>

  <link rel="stylesheet" href="tipografia/Fonts/WEB/css/chillax.css">

  <style>

    /* COLORES
    morado:#6A253A
    rosado:#E64B6B
    crema:#EFE2DA
    */

    *{
      box-sizing: border-box;
    }

    body{
      margin:0;
      font-family:'Chillax-Semibold';

      display:grid;
      grid-template-areas:
      "header"
      "main"
      "footer";

      grid-template-rows:250px auto 100px;
    }

    /* ================= HEADER ================= */

    header{
      grid-area:header;

      background-image:url(https://aurogenesis.com/wp-content/uploads/2025/07/Ponceau-4R-Colour-in-Malaysia.jpg);

      background-size:cover;
      background-repeat:no-repeat;

      display:flex;
      justify-content:center;
      align-items:center;

      border-bottom:5px solid #E64B6B;
    }

    #g{
      scale:0.5;
    }

    /* ================= MAIN ================= */

    main{
      grid-area:main;

      background-image:url("imagenes/2.png");
      background-size:cover;
      background-repeat:no-repeat;

      padding:30px;
    }

    #n{
      font-family:'Chillax-Medium';
      font-size:45px;
      color:#6A253A;

      border-bottom:2px solid #E64B6B;

      display:inline-block;
    }

    #fotos{
      display:grid;

      grid-template-columns:repeat(2,1fr);

      gap:40px;

      justify-items:center;

      margin-top:20px;
    }

    .prod{
      width:500px;
      height:400px;

      border-radius:20px;

      object-fit:cover;

      transition:0.3s;
    }

    .prod:hover{
      transform:scale(1.08);
      box-shadow:0 5px 20px rgba(0,0,0,0.3);
    }

    h3{
      font-family:'Chillax-Light';
      font-size:25px;

      color:#6A253A;

      border-bottom:2px solid #E64B6B;

      padding-left:40px;
    }

    h3 a{
      text-decoration:none;
      color:#6A253A;
    }

    /* ================= FOOTER ================= */

    footer{
      grid-area:footer;

      background:#6A253A;
      color:#EFE2DA;

      display:flex;
      justify-content:center;
      align-items:center;

      border-top:5px solid #E64B6B;
    }

    /* ================= FONDO OSCURO ================= */

    #overlay{
      position:fixed;

      inset:0;

      background:rgba(0,0,0,0.6);

      opacity:0;
      visibility:hidden;

      transition:0.6s;

      z-index:1000;
    }

    #overlay.activo{
      opacity:1;
      visibility:visible;
    }

    /* ================= NAV ================= */

    nav{
      position:fixed;

      top:50%;
      left:-350px;

      transform:translateY(-50%);

      width:280px;
      height:80vh;

      background:#6A253A;

      border-right:5px solid #E64B6B;

      border-radius:0 25px 25px 0;

      z-index:2000;

      transition:0.7s ease;

      display:flex;
      align-items:center;
    }

    nav.activo{
      left:0;
    }

    .indice ul{
      list-style:none;
      padding:0;
      margin:0;
      width:100%;
    }

    .indice a{
      text-decoration:none;

      color:#EFE2DA;

      display:block;

      padding:22px;

      transition:0.4s;
    }

    .indice a:hover{
      background:#E64B6B;
    }

    /* ================= BOTON ================= */

    #botonMenu{
      position:fixed;

      top:20px;
      left:20px;

      width:75px;
      height:75px;

      border-radius:50%;

      background:#E64B6B;

      display:flex;
      justify-content:center;
      align-items:center;

      cursor:pointer;

      z-index:3000;

      box-shadow:0 5px 15px rgba(0,0,0,0.4);
    }

    #botonMenu img{
      width:40px;
      height:40px;

      transition:0.7s ease;
    }

    /* giro horario */
    #botonMenu.abrir img{
      transform:rotate(360deg);
    }

    /* giro antihorario */
    #botonMenu.cerrar img{
      transform:rotate(-360deg);
    }

    /* ================= RESPONSIVE ================= */

    @media(max-width:1200px){

      #fotos{
        grid-template-columns:1fr;
      }

      .prod{
        width:100%;
        height:auto;
      }

      header{
        height:300px;
      }

      #g{
        width:90%;
      }

    }

  </style>
</head>
<body>

  <!-- BOTON -->
  <div id="botonMenu">
    <img src="https://cdn-icons-png.flaticon.com/512/1828/1828859.png">
  </div>

  <!-- OSCURECER -->
  <div id="overlay"></div>

  <!-- NAV -->
  <nav class="indice" id="menu">

    <ul>
      <li><a href="">Inicio</a></li>
      <li><a href="">Pestaña 1</a></li>
      <li><a href="">Pestaña 2</a></li>
      <li><a href="">Pestaña 3</a></li>
      <li><a href="">Pestaña 4</a></li>
    </ul>

  </nav>

  <!-- HEADER -->
  <header>
    <img src="imagenes/MYMS 4 SIN FONDO.png" id="g">
  </header>

  <!-- MAIN -->
  <main>

    <h2 id="n">Nuestra Variedad</h2>

    <section id="fotos">

      <div>
        <img src="imagenes/applepie.jpg" class="prod">
        <h3>TORTAS Y BROWNIES</h3>
      </div>

      <div>
        <img src="imagenes/frappe.png" class="prod">
        <h3>BEBIDAS FRIAS</h3>
      </div>

      <div>
        <img src="imagenes/cafe.jpg" class="prod">
        <h3>BEBIDAS CALIENTES</h3>
      </div>

      <div>
        <img src="imagenes/cinnamonrolls.jpg" class="prod">
        <h3>MASITAS</h3>
      </div>

    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 M&M's. Todos los derechos reservados.</p>
  </footer>

  <script>

    const boton = document.getElementById("botonMenu");
    const menu = document.getElementById("menu");
    const overlay = document.getElementById("overlay");

    let abierto = false;

    boton.addEventListener("click", () => {

      if(!abierto){

        menu.classList.add("activo");
        overlay.classList.add("activo");

        boton.classList.remove("cerrar");
        boton.classList.add("abrir");

        abierto = true;

      }else{

        menu.classList.remove("activo");
        overlay.classList.remove("activo");

        boton.classList.remove("abrir");
        boton.classList.add("cerrar");

        abierto = false;
      }

    });

    /* cerrar tocando fondo oscuro */

    overlay.addEventListener("click", () => {

      menu.classList.remove("activo");
      overlay.classList.remove("activo");

      boton.classList.remove("abrir");
      boton.classList.add("cerrar");

      abierto = false;

    });

  </script>

</body>
</html>
