<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">

    <style>
        body{
            display: grid;
            grid-template-rows: 300px 550px 150px;
            grid-template-columns:10% 90%;
            grid-template-areas: 
            "menu tit"
            "menu text"
            "menu foo" ;
        }

        header{
            grid-area: tit;
            background-image: url(cabecera.png);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 5px solid #E64B6B;
        }

        #uno{
            font-family: 'Parisienne', cursive;
            color: #EFE2DA;
            text-align: center;
            font-size: 100px;
            margin: 1rem 0;
        }

        section{
            grid-area: text;
            background: url(fondo.png);
        }

        nav{
            grid-area: menu;
            background-color: #6A253A;
            color: #EFE2DA;
            font-family: Arial, sans-serif;
            top: 0;
            left: 0;
            border-right: 5px solid #E64B6B;
    }
    .indice ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .indice a {
      text-decoration: none;
      color: #EFE2DA;
      display: block;
      padding: 20px;
      transition: background-color 0.6s, color 0.6s;
    }

    .indice a:hover {
      background-color: #E64B6B;
      color: #EFE2DA;
    }
    section{
    grid-area: text;
    background: url(fondo.png);
    padding: 30px;
}

section h1{
    margin-top: 20px;
    color: #6A253A;
    border-bottom: 3px solid #E64B6B;
}

section p{
    margin-bottom: 10px;
    font-family: Arial, sans-serif;
    color: #6A253A;
}

section h3{
    margin-top: 15px;
    color: #6A253A;
}

section button{
    margin: 10px 10px 0 0;
    padding: 10px 15px;
    border: none;
    background-color: #E64B6B;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

section button:hover{
    background-color: #c73b58;
}
    
    footer{
            grid-area: foo;
            background-color: #6A253A;
            color: #EFE2DA;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 3px solid #E64B6B;
        }

        @media(max-width:800px){
  body{
    grid-template-rows: auto auto auto auto;
    grid-template-columns:100%;
    grid-template-areas: 
    "tit"
    "menu"
    "text"
    "foo";
  }

  header{
    height: 200px;
  }

  #uno{
    font-size: 50px;
  }

  nav{
    border-right: none;
    border-bottom: 5px solid #E64B6B;
  }

  .indice a{
    padding: 15px;
    text-align: center;
  }

  section{
    padding: 15px;
  }

  section button{
    width: 100%;
    margin: 10px 0;
  }
}
    </style>
</head>

<body>

<header>
    <h1 id="uno">Vendedor</h1>
</header>

<nav class="indice">
    <ul>
    <li><a href="">Inicio</a></li>
    <li><a href="">pestaña 1</a></li>
    <li><a href="">pestaña 2</a></li>
    </ul>
</nav>

<section>
    <h1>Datos Personales</h1>
    <p>C.I:</p>
    <p>Nombre:</p>
    <p>Turno:</p>
    <p>Telefono:</p>

    <h1>VENTAS</h1>
    <h3>Registro de ventas:</h3>
    <button>Ventas en proceso</button>
    <button>Ventas Terminadas</button>
    <button>Historial de ventas</button>
    <h3>Inventario de producto:</h3>
    <button>Material disponible</button>
    <button>Historial de productos</button>
</section>

<footer>
    <div>
        <p>&copy; 2026 M&M's. Todos los derechos reservados.&nbsp;&nbsp;INSTAGRAM:@myms.sweetstudio</p>
    </div>
</footer>

</body>
</html>
